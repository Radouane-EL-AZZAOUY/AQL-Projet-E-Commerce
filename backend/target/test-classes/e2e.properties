# Base URL of the frontend SPA
e2e.base-url=http://localhost:5173

# Use true for CI/headless runs, false for local debug
e2e.headless=true

# Explicit wait timeout in seconds
e2e.timeout-seconds=10

# Keep implicit wait short when explicit waits are used.
e2e.implicit-wait-seconds=1

# Browser viewport size
e2e.window-width=1920
e2e.window-height=1080
