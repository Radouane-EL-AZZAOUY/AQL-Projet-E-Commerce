spring:
  application:
    name: ecommerce-backend
  datasource:
    url: jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

# SpringDoc / Swagger UI — http://localhost:8081/api/swagger-ui.html or http://localhost:8081/api/swagger-ui/index.html
# With context-path /api, use full spec URL so the browser loads the spec from the correct endpoint
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/v3/api-docs/swagger-config
    url: http://localhost:${server.port:8081}/api/v3/api-docs
    operationsSorter: method
    tagsSorter: alpha

# JWT (dev only - en prod utiliser variables d'environnement)
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: 86400000

logging:
  level:
    com.ecommerce: INFO
    org.springframework.security: WARN
