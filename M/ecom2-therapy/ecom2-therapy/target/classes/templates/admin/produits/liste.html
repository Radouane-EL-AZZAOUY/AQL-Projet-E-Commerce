<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Produits — Admin ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">Shop<span>Elite</span></a>
  <div class="navbar-nav">
    <a th:href="@{/catalogue}" class="nav-link">Voir le site</a>
    <a th:href="@{/admin}" class="nav-link" style="color:var(--or)">⚙ Admin</a>
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-secondary btn-sm">Déconnexion</button>
    </form>
  </div>
</nav>
<div class="container">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <div class="page-header">
    <h1 class="page-title">Gestion des <span>Produits</span></h1>
  </div>

  <div class="admin-nav">
    <a th:href="@{/admin}">Dashboard</a>
    <a th:href="@{/admin/produits}" class="active">📦 Produits</a>
    <a th:href="@{/admin/categories}">🗂 Catégories</a>
    <a th:href="@{/admin/commandes}">📋 Commandes</a>
  </div>

  <div style="margin-bottom:1.5rem">
    <a th:href="@{/admin/produits/nouveau}" class="btn btn-primary">+ Nouveau produit</a>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr><th>ID</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Stock</th><th>MAJ Stock</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="p : ${produits}">
          <td th:text="${p.id}"></td>
          <td><strong th:text="${p.nom}"></strong><br><span style="font-size:0.78rem" th:text="${#strings.abbreviate(p.description,60)}"></span></td>
          <td th:text="${p.categorie != null ? p.categorie.nom : '—'}"></td>
          <td style="color:var(--or);font-weight:700" th:text="${#numbers.formatDecimal(p.prix,1,'COMMA',2,'POINT')} + ' €'"></td>
          <td>
            <span th:class="${p.stock > 5} ? 'stock-badge stock-ok' : 'stock-badge stock-low'"
                  th:text="${p.stock}"></span>
          </td>
          <td>
            <form th:action="@{/admin/produits/stock/{id}(id=${p.id})}" method="post" style="display:flex;gap:0.4rem">
              <input type="number" name="stock" th:value="${p.stock}" min="0" class="form-control" style="width:70px"/>
              <button type="submit" class="btn btn-success btn-sm">✓</button>
            </form>
          </td>
          <td style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <a th:href="@{/admin/produits/modifier/{id}(id=${p.id})}" class="btn btn-secondary btn-sm">Modifier</a>
            <form th:action="@{/admin/produits/supprimer/{id}(id=${p.id})}" method="post"
                  onsubmit="return confirm('Supprimer ce produit ?')">
              <button type="submit" class="btn btn-danger btn-sm">Supprimer</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<footer><span>ShopElite</span> — Projet AQL 2025/2026</footer>
</body>
</html>
