<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Shop<span style="color:var(--blanc)">Elite</span></div>
    <div class="auth-subtitle">Connectez-vous à votre compte</div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="auth-info-box">
      <strong>Comptes de test :</strong><br>
      Admin: admin@ecommerce.com / admin123<br>
      Client: jean.dupont@email.com / client123
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" name="username" class="form-control" required placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Se connecter</button>
    </form>

    <div class="auth-footer">
      Pas encore de compte ? <a th:href="@{/inscription}">Créer un compte</a>
    </div>
  </div>
</div>
</body>
</html>
