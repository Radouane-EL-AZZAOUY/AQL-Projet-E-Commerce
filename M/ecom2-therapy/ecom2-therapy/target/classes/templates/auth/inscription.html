<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="width:480px">
    <div class="auth-logo">Shop<span style="color:var(--blanc)">Elite</span></div>
    <div class="auth-subtitle">Créez votre compte</div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/inscription}" method="post" th:object="${utilisateur}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" th:field="*{nom}" class="form-control" required placeholder="Votre nom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" th:field="*{prenom}" class="form-control" required placeholder="Votre prénom"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" th:field="*{email}" class="form-control" required placeholder="votre@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" th:field="*{motDePasse}" class="form-control" required placeholder="Minimum 6 caractères"/>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Créer mon compte</button>
    </form>

    <div class="auth-footer">
      Déjà inscrit ? <a th:href="@{/login}">Se connecter</a>
    </div>
  </div>
</div>
</body>
</html>
