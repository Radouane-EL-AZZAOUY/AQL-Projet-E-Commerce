<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation commande — ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">Shop<span>Elite</span></a>
  <div class="navbar-nav">
    <a th:href="@{/panier}" class="nav-link">← Retour au panier</a>
  </div>
</nav>

<div class="container" style="max-width:800px">
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <div class="page-header">
    <h1 class="page-title">Valider ma <span>Commande</span></h1>
  </div>

  <div style="display:grid;grid-template-columns:1fr 340px;gap:2rem">
    <div>
      <div class="card" style="margin-bottom:1.5rem">
        <h3 style="font-family:var(--font-title);margin-bottom:1.2rem;color:var(--blanc)">Adresse de livraison</h3>
        <form id="checkoutForm" th:action="@{/panier/valider}" method="post">
          <div class="form-group">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" th:value="${utilisateur.prenom + ' ' + utilisateur.nom}" readonly style="opacity:0.7"/>
          </div>
          <div class="form-group">
            <label class="form-label">Adresse de livraison *</label>
            <textarea name="adresse" class="form-control" rows="3" required
                      th:text="${utilisateur.adresse}" placeholder="Numéro, rue, ville, code postal..."></textarea>
          </div>
        </form>
      </div>

      <!-- Récap articles -->
      <div class="card">
        <h3 style="font-family:var(--font-title);margin-bottom:1rem;color:var(--blanc)">Articles commandés</h3>
        <div th:each="ligne : ${panier.lignes}" class="recap-line" style="display:flex;justify-content:space-between;padding:0.7rem 0;border-bottom:1px solid var(--noir-border)">
          <span style="color:var(--blanc)" th:text="${ligne.quantite} + ' × ' + ${ligne.produit.nom}"></span>
          <span style="color:var(--or);font-weight:600" th:text="${#numbers.formatDecimal(ligne.sousTotal,1,'COMMA',2,'POINT')} + ' €'"></span>
        </div>
      </div>
    </div>

    <!-- TOTAL & CONFIRM -->
    <div class="panier-recap">
      <h3 style="font-family:var(--font-title);margin-bottom:1rem;color:var(--blanc)">Total commande</h3>
      <div class="recap-total" style="font-size:1.5rem;border-top:1px solid var(--or-fonce);padding-top:1rem">
        <span>Total TTC</span>
        <span th:text="${#numbers.formatDecimal(panier.total,1,'COMMA',2,'POINT')} + ' €'"></span>
      </div>
      <button type="submit" form="checkoutForm" class="btn btn-primary btn-block btn-lg" style="margin-top:1.5rem">
        ✓ Confirmer la commande
      </button>
      <a th:href="@{/panier}" class="btn btn-secondary btn-block" style="margin-top:0.5rem">Modifier le panier</a>
      <p style="color:var(--gris);font-size:0.78rem;text-align:center;margin-top:1rem">
        🔒 Commande sécurisée — Stock réservé à la confirmation
      </p>
    </div>
  </div>
</div>
<footer><span>ShopElite</span> — Projet AQL 2025/2026</footer>
</body>
</html>
