<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><title>Commande — ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">Shop<span>Elite</span></a>
  <div class="navbar-nav">
    <a th:href="@{/commande/historique}" class="nav-link">← Mes commandes</a>
    <span sec:authorize="hasRole('ROLE_ADMIN')"><a th:href="@{/admin}" class="nav-link" style="color:var(--or)">⚙ Admin</a></span>
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-secondary btn-sm">Déconnexion</button>
    </form>
  </div>
</nav>
<div class="container" style="max-width:800px">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="page-header">
    <h1 class="page-title">Commande <span th:text="'#' + commande.id"></span></h1>
  </div>

  <div class="card" style="margin-bottom:1.5rem">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
      <div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--or);margin-bottom:0.3rem">Date</div>
        <div style="color:var(--blanc)" th:text="${#temporals.format(commande.dateCommande,'dd/MM/yyyy HH:mm')}"></div>
      </div>
      <div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--or);margin-bottom:0.3rem">État</div>
        <span th:class="${commande.etat.name() == 'VALIDEE' ? 'badge badge-validee' : (commande.etat.name() == 'ANNULEE' ? 'badge badge-annulee' : 'badge badge-en-cours')}"
              th:text="${commande.etat}"></span>
      </div>
      <div>
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--or);margin-bottom:0.3rem">Total</div>
        <div style="color:var(--or);font-weight:700;font-size:1.2rem" th:text="${#numbers.formatDecimal(commande.montantTotal,1,'COMMA',2,'POINT')} + ' €'"></div>
      </div>
    </div>
    <div th:if="${commande.adresseLivraison}" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--noir-border)">
      <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--or);margin-bottom:0.3rem">Adresse de livraison</div>
      <div style="color:var(--gris)" th:text="${commande.adresseLivraison}"></div>
    </div>
  </div>

  <div class="card">
    <h3 style="font-family:var(--font-title);margin-bottom:1rem;color:var(--blanc)">Articles</h3>
    <table>
      <thead><tr><th>Produit</th><th>Prix unitaire</th><th>Quantité</th><th>Sous-total</th></tr></thead>
      <tbody>
        <tr th:each="ligne : ${commande.lignes}">
          <td><strong th:text="${ligne.produit.nom}"></strong></td>
          <td th:text="${#numbers.formatDecimal(ligne.prixUnitaire,1,'COMMA',2,'POINT')} + ' €'"></td>
          <td th:text="${ligne.quantite}"></td>
          <td style="color:var(--or);font-weight:600" th:text="${#numbers.formatDecimal(ligne.sousTotal,1,'COMMA',2,'POINT')} + ' €'"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<footer><span>ShopElite</span> — Projet AQL 2025/2026</footer>
</body>
</html>
