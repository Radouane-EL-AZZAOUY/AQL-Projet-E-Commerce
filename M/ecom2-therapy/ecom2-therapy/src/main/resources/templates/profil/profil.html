<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><title>Mon Profil — ShopElite</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/}">Shop<span>Elite</span></a>
  <div class="navbar-nav">
    <a th:href="@{/catalogue}" class="nav-link">Catalogue</a>
    <a th:href="@{/panier}" class="nav-link">🛒 Panier</a>
    <a th:href="@{/commande/historique}" class="nav-link">Mes commandes</a>
    <a th:href="@{/profil}" class="nav-link active">Mon profil</a>
    <span sec:authorize="hasRole('ROLE_ADMIN')"><a th:href="@{/admin}" class="nav-link" style="color:var(--or)">⚙ Admin</a></span>
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-secondary btn-sm">Déconnexion</button>
    </form>
  </div>
</nav>
<div class="container" style="max-width:700px">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="page-header"><h1 class="page-title">Mon <span>Profil</span></h1></div>

  <div class="card">
    <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--noir-border)">
      <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--or-fonce),var(--or));display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:var(--noir)"
           th:text="${#strings.substring(utilisateur.prenom,0,1) + #strings.substring(utilisateur.nom,0,1)}">JD</div>
      <div>
        <div style="font-family:var(--font-title);font-size:1.4rem;color:var(--blanc)" th:text="${utilisateur.prenom + ' ' + utilisateur.nom}"></div>
        <div style="color:var(--gris);font-size:0.9rem" th:text="${utilisateur.email}"></div>
      </div>
    </div>

    <form th:action="@{/profil/modifier}" method="post">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" name="nom" th:value="${utilisateur.nom}" class="form-control" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" name="prenom" th:value="${utilisateur.prenom}" class="form-control" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input type="tel" name="telephone" th:value="${utilisateur.telephone}" class="form-control" placeholder="06 xx xx xx xx"/>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse de livraison</label>
        <textarea name="adresse" class="form-control" rows="3" th:text="${utilisateur.adresse}" placeholder="Votre adresse complète..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Sauvegarder les modifications</button>
    </form>
  </div>

  <div style="margin-top:1rem;text-align:right">
    <a th:href="@{/commande/historique}" class="btn btn-secondary">Voir mes commandes →</a>
  </div>
</div>
<footer><span>ShopElite</span> — Projet AQL 2025/2026</footer>
</body>
</html>
